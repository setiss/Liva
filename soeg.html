<!DOCTYPE html>
<html lang="da" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Søg — Afsætning Studiesite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        .chapter-card { transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .chapter-card:hover { transform: translateY(-6px) scale(1.01); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover { transform: translateX(3px); }
        .sidebar-link.active { background: linear-gradient(135deg, #ecfdf5, #d1fae5); border-left: 3px solid #10b981; }
        .fade-up { animation: fadeUp 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen antialiased">

<nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-200/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="text-xl">📖</span>
                <span class="font-extrabold text-slate-900 group-hover:text-emerald-600 transition-colors">Afsætning</span>
            </a>
            <div class="flex items-center gap-2">
                <a href="index.html" class="hidden sm:inline-flex px-3 py-1.5 rounded-full text-sm text-slate-600 hover:bg-emerald-50 hover:text-emerald-700 transition-all">Hjem</a>
                <a href="soeg.html" class="px-3 py-1.5 rounded-full text-sm text-slate-600 hover:bg-emerald-50 hover:text-emerald-700 transition-all flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <span class="hidden sm:inline">Søg</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="pt-24 pb-16">
    <div class="max-w-2xl mx-auto px-4 sm:px-6">
        <h1 class="text-2xl font-extrabold text-slate-900 mb-6">Søg i alle kapitler</h1>
        <div class="relative mb-8">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="q" placeholder="F.eks. 'PESTEL', 'segmentering', 'Porters'..." 
                   class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent text-base shadow-sm"
                   autocomplete="off" autofocus>
        </div>
        <div id="results" class="space-y-2"></div>
        <p id="empty" class="hidden text-center py-12 text-slate-400">Ingen resultater</p>
    </div>
</main>


<footer class="mt-24 py-10 border-t border-slate-100 bg-slate-50/50">
    <div class="max-w-7xl mx-auto px-4 text-center">
        <p class="text-slate-400 text-sm">📖 Afsætning Studiesite — Eksamen 2026</p>
    </div>
</footer>

<script>
let D=[];
fetch('search-index.json').then(r=>r.json()).then(d=>{D=d});
const q=document.getElementById('q'),R=document.getElementById('results'),E=document.getElementById('empty');
q.addEventListener('input',function(){
  const v=this.value.toLowerCase().trim();
  if(v.length<2){R.innerHTML='';E.classList.add('hidden');return}
  const m=D.filter(i=>i.t.toLowerCase().includes(v)||i.x.toLowerCase().includes(v)).slice(0,15);
  if(!m.length){R.innerHTML='';E.classList.remove('hidden');return}
  E.classList.add('hidden');
  R.innerHTML=m.map(i=>{
    let s='';const idx=i.x.toLowerCase().indexOf(v);
    if(idx>=0){const a=Math.max(0,idx-50),b=Math.min(i.x.length,idx+v.length+50);
      s=`<p class="text-xs text-slate-500 mt-1">${(a>0?'...':'')}${i.x.slice(a,idx)}<mark class="bg-yellow-200 rounded px-0.5">${i.x.slice(idx,idx+v.length)}</mark>${i.x.slice(idx+v.length,b)}${(b<i.x.length?'...':'')}</p>`;}
    return `<a href="${i.u}" class="block p-4 rounded-xl bg-white border border-slate-100 hover:border-emerald-200 hover:shadow-sm transition-all">
      <span class="font-semibold text-slate-800 text-sm">${i.t}</span>
      <span class="text-xs text-emerald-600 ml-2">${i.c}</span>${s}</a>`;
  }).join('');
});
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();q.focus();}});
</script>
</body>
</html>
